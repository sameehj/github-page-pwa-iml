<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InnerMonkeyLabs Quick Links</title>
    <link rel="canonical" href="https://sameehj.github.io/github-page-pwa-iml/" />
    <link rel="manifest" href="/github-page-pwa-iml/manifest.webmanifest">
    <link rel="stylesheet" href="/github-page-pwa-iml/css/styles.css">
</head>
<body>
    <div class="language-switcher">
        <button id="lang-toggle" class="lang-btn" type="button" onclick="toggleLanguage()">العربية</button>
    </div>

    <div class="container">
        <div class="content-wrapper">
            <div class="logo-container">
                <img src="/github-page-pwa-iml/img/logo.png" alt="InnerMonkeyLabs Logo" class="logo">
            </div>
            <h1 data-i18n="title">InnerMonkeyLabs Quick Links</h1>
            <div class="links-grid">
                <a href="https://innermonkeylabs.com/login" class="link-card">
                    <h2 data-i18n="loginTitle">🧪 Student Login</h2>
                    <p data-i18n="loginDesc">Log in to access your doses</p>
                </a>
                <a href="https://innermonkeylabs.com" class="link-card">
                    <h2 data-i18n="mainTitle">🏠 Main Website</h2>
                    <p data-i18n="mainDesc">Visit our main website</p>
                </a>
                <a href="https://innermonkeylabs.com/blog" class="link-card">
                    <h2 data-i18n="blogTitle">📖 Blog</h2>
                    <p data-i18n="blogDesc">Read our latest articles</p>
                </a>
                <a href="https://innermonkeylabs.com/contact" class="link-card">
                    <h2 data-i18n="contactTitle">📬 Contact</h2>
                    <p data-i18n="contactDesc">Get in touch with us</p>
                </a>
            </div>
        </div>
    </div>

    <script>
        if (navigator.serviceWorker) {
            navigator.serviceWorker.register(
                '/github-page-pwa-iml/sw.js',
                {scope: '/github-page-pwa-iml/'}
            )
        }

        const translations = {
            en: {
                title: 'InnerMonkeyLabs Quick Links',
                loginTitle: '🧪 Student Login',
                loginDesc: 'Log in to access your doses',
                mainTitle: '🏠 Main Website',
                mainDesc: 'Visit our main website',
                blogTitle: '📖 Blog',
                blogDesc: 'Read our latest articles',
                contactTitle: '📬 Contact',
                contactDesc: 'Get in touch with us',
                toggleLabel: 'العربية'
            },
            ar: {
                title: 'روابط InnerMonkeyLabs السريعة',
                loginTitle: '🧪 تسجيل الدخول',
                loginDesc: 'سجّل دخولك للوصول إلى جرعاتك',
                mainTitle: '🏠 الموقع الرئيسي',
                mainDesc: 'زيارة موقعنا الرئيسي',
                blogTitle: '📖 المدونة',
                blogDesc: 'اقرأ أحدث مقالاتنا',
                contactTitle: '📬 اتصل بنا',
                contactDesc: 'تواصل معنا',
                toggleLabel: 'English'
            }
        };

        function changeLanguage(lang) {
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'en' ? 'ltr' : 'rtl';

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.textContent = translations[lang][key];
            });

            document.getElementById('lang-toggle').textContent = translations[lang].toggleLabel;
            localStorage.setItem('preferred-language', lang);
        }

        function toggleLanguage() {
            const currentLang = document.documentElement.lang || 'en';
            const nextLang = currentLang === 'en' ? 'ar' : 'en';
            changeLanguage(nextLang);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const storedLang = localStorage.getItem('preferred-language') || 'ar';
            changeLanguage(storedLang);
        });
    </script>
</body>
</html>
